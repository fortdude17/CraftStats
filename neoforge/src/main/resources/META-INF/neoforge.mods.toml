modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/lhaze/craftstats/issues"

[[mods]]
    modId = "craftstats"
    version = "1.0.0"
    displayName = "CraftStats!"
    logoFile = "icon.png"
    description = '''
Universal in-game stats editor for mobs, blocks, items and players.
Right-click with the Craft Wand to open the stat editor GUI.
'''
    displayURL = "https://github.com/lhaze/craftstats"
    authors = "Fortdude21"

[[dependencies.craftstats]]
    modId = "neoforge"
    type = "required"
    versionRange = "[21.1,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.craftstats]]
    modId = "minecraft"
    type = "required"
    versionRange = "[1.21.1,1.22)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.craftstats]]
    modId = "architectury"
    type = "required"
    versionRange = "[13.0,)"
    ordering = "NONE"
    side = "BOTH"

[[mixins]]
    config = "craftstats-common.mixins.json"

[[mixins]]
    config = "craftstats-neoforge.mixins.json"
